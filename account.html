<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My Account - WB Store</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="top-navbar">
        <div class="nav-top-row">
            <div class="page-title">My Account</div>
            <div class="nav-actions">
                <button id="theme-toggle" class="theme-btn">
                    <i class="fa-solid fa-sun" id="theme-icon"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="main-content account-page">
        
        <div id="guest-state" class="empty-state" style="display: none;">
            <i class="fa-solid fa-user-lock empty-icon" style="color: var(--text-grey);"></i>
            <h2>Please Login</h2>
            <p>Sign in to view your profile, saved addresses, and track your orders.</p>
            <a href="login.html" class="btn-primary" style="display: inline-block; padding: 12px 24px; text-decoration: none; margin-top: 15px;">
                Login / Sign Up
            </a>
        </div>

        <div id="logged-in-state" style="display: none;">
            
            <div class="profile-header card-panel">
                <div class="profile-avatar">
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="profile-info">
                    <h2 id="user-display-name">Loading...</h2>
                    <p id="user-display-email" style="color: var(--text-grey); font-size: 14px;">loading@email.com</p>
                </div>
            </div>

            <div class="account-section card-panel">
                <div class="section-header-row">
                    <h3><i class="fa-solid fa-location-dot" style="color: var(--neon-green); margin-right: 8px;"></i> Saved Address</h3>
                    <button id="edit-address-btn" class="text-btn" style="color: var(--neon-green); border: none; background: none; cursor: pointer;">Edit</button>
                </div>
                <div id="address-display" class="address-box">
                    <p style="color: var(--text-grey); font-size: 14px;">No address saved yet.</p>
                </div>
            </div>

            <div class="account-section card-panel">
                <h3><i class="fa-solid fa-box" style="color: var(--neon-green); margin-right: 8px;"></i> My Orders</h3>
                <div id="orders-list" class="orders-list">
                    <p style="color: var(--text-grey); font-size: 14px;">No recent orders.</p>
                </div>
            </div>

            <button id="logout-btn" class="logout-btn" style="width: 100%; padding: 15px; margin-top: 20px; background-color: transparent; border: 1px solid #ff4444; color: #ff4444; border-radius: 8px; font-weight: bold;">
                <i class="fa-solid fa-arrow-right-from-bracket"></i> LOG OUT
            </button>

        </div>

    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </a>
        <a href="wishlist.html" class="nav-item">
            <i class="fa-solid fa-heart"></i>
            <span>Wishlist</span>
        </a>
        <a href="cart.html" class="nav-item">
            <div class="cart-icon-wrapper">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="cart-badge" id="cart-badge">0</span>
            </div>
            <span>Cart</span>
        </a>
        <a href="account.html" class="nav-item active">
            <i class="fa-solid fa-user"></i>
            <span>Account</span>
        </a>
    </nav>

    <script type="module" src="js/main.js"></script>
</body>
</html>
