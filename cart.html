<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shopping Cart - WB Store</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="top-navbar">
        <div class="nav-top-row">
            <button class="icon-btn" onclick="history.back()">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            
            <div class="page-title">
                Your Cart
            </div>
            
            <div class="nav-actions">
                <button id="theme-toggle" class="theme-btn">
                    <i class="fa-solid fa-sun" id="theme-icon"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="main-content cart-page">
        
        <div id="empty-cart-message" class="empty-state">
            <i class="fa-solid fa-cart-arrow-down empty-icon"></i>
            <h2>Your Cart is Empty</h2>
            <p>Looks like you haven't added any premium gadgets yet.</p>
            <a href="index.html" class="btn-primary" style="display: inline-block; padding: 12px 24px; text-decoration: none; margin-top: 15px;">
                Start Shopping
            </a>
        </div>

        <div id="filled-cart-container" style="display: none;">
            
            <div class="cart-items-list" id="cart-items-list">
                </div>

            <div class="order-summary-card">
                <h3>Order Summary</h3>
                <div class="summary-row">
                    <span>Items Total</span>
                    <span id="summary-items-total">₹0</span>
                </div>
                <div class="summary-row">
                    <span>Shipping</span>
                    <span style="color: var(--neon-green);">Free</span>
                </div>
                <hr class="summary-divider">
                <div class="summary-row total-row">
                    <span>Total Amount</span>
                    <span id="summary-final-total">₹0</span>
                </div>

                <button id="proceed-checkout-btn" class="btn-primary full-width-btn" style="margin-top: 20px;">
                    PROCEED TO CHECKOUT <i class="fa-solid fa-arrow-right" style="margin-left: 8px;"></i>
                </button>
            </div>

        </div>

    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </a>
        <a href="wishlist.html" class="nav-item">
            <i class="fa-solid fa-heart"></i>
            <span>Wishlist</span>
        </a>
        <a href="cart.html" class="nav-item active">
            <div class="cart-icon-wrapper">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="cart-badge" id="cart-badge">0</span>
            </div>
            <span>Cart</span>
        </a>
        <a href="account.html" class="nav-item">
            <i class="fa-solid fa-user"></i>
            <span>Account</span>
        </a>
    </nav>

    <script type="module" src="js/main.js"></script>
    
</body>
</html>
