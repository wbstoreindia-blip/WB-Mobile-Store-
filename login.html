<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - WB Store</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        .auth-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 80vh;
            padding: 20px;
        }
        .auth-logo {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .auth-input {
            width: 100%;
            padding: 15px;
            background-color: var(--bg-panel);
            border: 1px solid var(--border-color);
            color: var(--text-white);
            border-radius: 8px;
            font-size: 16px;
        }
        .auth-input:focus {
            outline: none;
            border-color: var(--neon-green);
        }
        .auth-toggle-text {
            text-align: center;
            margin-top: 20px;
            color: var(--text-grey);
            font-size: 14px;
        }
        .auth-toggle-text span {
            color: var(--neon-green);
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header class="top-navbar">
        <div class="nav-top-row">
            <button class="icon-btn" onclick="history.back()">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <div class="nav-actions">
                <button id="theme-toggle" class="theme-btn">
                    <i class="fa-solid fa-sun" id="theme-icon"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="auth-container">
            
            <div class="auth-logo">
                WB STORE <i class="fa-solid fa-bolt" style="color: var(--neon-green);"></i>
            </div>

            <h2 id="auth-title" style="margin-bottom: 20px;">Welcome Back</h2>

            <form id="auth-form" class="auth-form">
                
                <input type="text" id="auth-name" class="auth-input signup-only" placeholder="Full Name" style="display: none;">
                <input type="tel" id="auth-phone" class="auth-input signup-only" placeholder="Phone Number" style="display: none;">
                
                <input type="email" id="auth-email" class="auth-input" placeholder="Email Address" required>
                <input type="password" id="auth-password" class="auth-input" placeholder="Password" required>
                
                <button type="submit" id="auth-submit-btn" class="btn-primary full-width-btn" style="padding: 15px; margin-top: 10px;">
                    SIGN IN
                </button>
            </form>

            <p class="auth-toggle-text">
                <span id="auth-toggle-msg">Don't have an account?</span> 
                <span id="auth-toggle-btn">Sign Up</span>
            </p>

        </div>
    </main>

    <script type="module" src="js/main.js"></script>
    </body>
</html>
