<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - WB Mobile Store</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-subtitle { font-size:0.78rem; text-align:center; color:var(--secondary); margin-top:24px; }
    .auth-subtitle a { color:var(--card); font-weight:600; }
    .error-text { color:#c0392b; font-size:0.83rem; margin-top:8px; display:none; background:rgba(192,57,43,0.08); padding:10px 14px; border-radius:8px; border:1px solid rgba(192,57,43,0.18); }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <img src="logo.png" alt="WB Mobile Store" onerror="this.style.display='none'">
      <h1>WB Mobile Store</h1>
      <p>Sign in to continue shopping</p>
    </div>

    <div class="tabs" style="margin-bottom:28px">
      <button class="tab-btn active" id="tab-login">Sign In</button>
      <button class="tab-btn" id="tab-register">Register</button>
    </div>

    <!-- LOGIN PANE -->
    <div id="pane-login">
      <form id="login-form" autocomplete="on">
        <div class="form-group">
          <label class="form-label" for="login-email">Email Address</label>
          <input class="form-input" type="email" id="login-email" name="email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="login-pass">Password</label>
          <input class="form-input" type="password" id="login-pass" name="password" placeholder="Enter your password" required>
        </div>
        <div id="error-login" class="error-text"></div>
        <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px">Sign In</button>
      </form>
    </div>

    <!-- REGISTER PANE -->
    <div id="pane-register" style="display:none">
      <form id="register-form" autocomplete="on">
        <div class="form-group">
          <label class="form-label" for="reg-email-input">Email Address</label>
          <input class="form-input" type="email" id="reg-email-input" name="reg-email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-pass-input">Password</label>
          <input class="form-input" type="password" id="reg-pass-input" name="reg-password" placeholder="At least 6 characters" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-confirm-input">Confirm Password</label>
          <input class="form-input" type="password" id="reg-confirm-input" name="reg-confirm" placeholder="Repeat your password" required>
        </div>
        <div id="error-register" class="error-text"></div>
        <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px">Create Account</button>
      </form>
    </div>

    <p class="auth-subtitle">By continuing, you agree to our <a href="#">Terms of Service</a></p>
  </div>
</div>

<script type="module" src="auth.js"></script>
</body>
</html>
