<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Wb Mobile Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="style.css">

  <style>
    /* Extra styles specific to login page */
    .login-page-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
    }

    /* Floating decorative shapes */
    .deco-ring {
      position: fixed;
      border-radius: 50%;
      border: 1px solid rgba(124,58,237,0.15);
      pointer-events: none;
      animation: rotateRing 20s linear infinite;
    }
    .deco-ring-1 {
      width: 600px; height: 600px;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .deco-ring-2 {
      width: 400px; height: 400px;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      border-color: rgba(6,182,212,0.12);
      animation-direction: reverse;
      animation-duration: 14s;
    }
    @keyframes rotateRing {
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .login-card {
      position: relative;
      z-index: 1;
    }

    /* Glow shimmer at top of card */
    .card-glow-top {
      position: absolute;
      top: -1px; left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-purple), transparent);
      border-radius: 2px;
    }

    .input-password-wrap {
      position: relative;
    }
    .toggle-pw {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1rem;
      transition: color 0.2s;
    }
    .toggle-pw:hover { color: var(--text-primary); }

    .login-footer-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      font-size: 0.82rem;
      color: var(--text-muted);
    }
    .login-footer-links a {
      color: var(--purple-lt);
      transition: color 0.2s;
    }
    .login-footer-links a:hover { color: var(--neon-cyan); }
  </style>
</head>
<body>
  <div class="mesh-bg" aria-hidden="true"></div>
  <div class="deco-ring deco-ring-1" aria-hidden="true"></div>
  <div class="deco-ring deco-ring-2" aria-hidden="true"></div>

  <div class="login-page-wrap">
    <div class="glass-card login-card" role="main">
      <div class="card-glow-top" aria-hidden="true"></div>

      <!-- Logo -->
      <div class="login-logo">
        <div class="logo-mark">📱</div>
        <h1>Wb Mobile Store</h1>
        <p>Sign in to your account</p>
      </div>

      <!-- Error / success status -->
      <div
        id="loginError"
        class="form-status"
        role="alert"
        aria-live="assertive"
        style="display:none;"
      ></div>

      <!-- Loading spinner -->
      <div id="loginSpinner" aria-label="Signing in…" role="status"></div>

      <!-- Login Form -->
      <form class="login-form" id="loginForm" novalidate>
        <div class="input-group">
          <label for="loginEmail">Email Address</label>
          <input
            type="email"
            id="loginEmail"
            class="frosted-input"
            placeholder="you@example.com"
            autocomplete="email"
            required
          >
        </div>

        <div class="input-group">
          <label for="loginPassword">Password</label>
          <div class="input-password-wrap">
            <input
              type="password"
              id="loginPassword"
              class="frosted-input"
              placeholder="Enter your password"
              autocomplete="current-password"
              style="padding-right:44px;"
              required
            >
            <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password visibility">👁</button>
          </div>
        </div>

        <button type="submit" class="btn btn-glow" id="loginBtn" style="width:100%;margin-top:6px;">
          Sign In
        </button>
      </form>

      <div class="login-divider">or</div>

      <div class="login-footer-links">
        <a href="index.html">← Back to Store</a>
        <a href="index.html">Browse as Guest</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { loginUser } from "./auth.js";

    // Form submit
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email    = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;

      const errorBox = document.getElementById("loginError");
      if (!email || !password) {
        errorBox.textContent = "⚠️ Please enter your email and password.";
        errorBox.className   = "form-status error";
        errorBox.style.display = "block";
        return;
      }

      await loginUser(email, password);
    });

    // Toggle password visibility
    document.getElementById("togglePw").addEventListener("click", () => {
      const pw  = document.getElementById("loginPassword");
      const btn = document.getElementById("togglePw");
      if (pw.type === "password") {
        pw.type = "text";
        btn.textContent = "🙈";
      } else {
        pw.type = "password";
        btn.textContent = "👁";
      }
    });
  </script>
</body>
</html>
