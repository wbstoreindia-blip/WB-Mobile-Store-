<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Product Details - WB Store</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="top-navbar">
        <div class="nav-top-row">
            <button class="icon-btn" onclick="history.back()">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            
            <div class="page-title">
                Details
            </div>
            
            <div class="nav-actions">
                <button id="theme-toggle" class="theme-btn">
                    <i class="fa-solid fa-sun" id="theme-icon"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="main-content product-page">
        
        <div id="loading-spinner" class="spinner-container">
            <i class="fa-solid fa-circle-notch fa-spin"></i> Loading...
        </div>

        <div id="product-details-container" style="display: none;">
            
            <section class="product-gallery">
                <div class="main-image-container">
                    <img id="main-product-image" src="" alt="Product Image">
                    <span id="product-discount-badge" class="discount-badge hidden"></span>
                </div>
                
                <div class="thumbnails-container" id="product-thumbnails">
                    </div>
            </section>

            <section class="product-info-section">
                <div class="title-and-wishlist">
                    <div>
                        <p id="product-brand" class="brand-name"></p>
                        <h1 id="product-title" class="product-title"></h1>
                    </div>
                    <button id="wishlist-btn" class="wishlist-btn">
                        <i class="fa-regular fa-heart"></i>
                    </button>
                </div>

                <div class="price-container">
                    <span id="product-price" class="current-price"></span>
                    <span id="product-old-price" class="old-price hidden"></span>
                </div>

                <div class="description-container">
                    <h3>Description</h3>
                    <p id="product-description" class="product-description"></p>
                </div>

                <button id="add-to-cart-btn" class="btn-primary full-width-btn">
                    <i class="fa-solid fa-cart-shopping"></i> ADD TO CART
                </button>
            </section>
        </div>

    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </a>
        <a href="wishlist.html" class="nav-item">
            <i class="fa-solid fa-heart"></i>
            <span>Wishlist</span>
        </a>
        <a href="cart.html" class="nav-item">
            <div class="cart-icon-wrapper">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="cart-badge" id="cart-badge">0</span>
            </div>
            <span>Cart</span>
        </a>
        <a href="account.html" class="nav-item">
            <i class="fa-solid fa-user"></i>
            <span>Account</span>
        </a>
    </nav>

    <script type="module" src="js/main.js"></script>
    
</body>
</html>
