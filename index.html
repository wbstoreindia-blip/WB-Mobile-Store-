<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WB Mobile Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- PAGE LOADER -->
<div class="page-loader" id="page-loader">
  <div class="loader-ring"></div>
</div>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="index.html" class="navbar-logo">
    <img src="logo.png" alt="WB" onerror="this.style.display='none'">
    <span>WB Mobile Store</span>
  </a>

  <div class="navbar-search">
    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input type="text" id="search-input" placeholder="Search mobiles, accessories..." autocomplete="off">
  </div>

  <div class="navbar-actions">
    <a href="cart.html" class="nav-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      <span class="cart-badge" style="display:none">0</span>
    </a>
    <a href="profile.html" class="nav-btn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </a>
  </div>
</nav>

<!-- SEARCH OVERLAY -->
<div class="search-overlay" id="search-overlay">
  <div class="search-panel" id="search-panel"></div>
</div>

<div class="page-content">

  <!-- BANNER SLIDER -->
  <div class="banner-slider" id="banner-slider">
    <div class="banner-track"></div>
    <div class="banner-dots"></div>
  </div>

  <!-- CATEGORIES -->
  <div class="section">
    <div class="section-header">
      <h2 class="section-title">Category</h2>
    </div>
    <div class="filter-scroll" id="category-filters">
      <button class="chip active" data-cat="All">All</button>
    </div>
  </div>

  <!-- BRANDS -->
  <div class="section" style="padding-top:0">
    <div class="section-header">
      <h2 class="section-title">Brand</h2>
    </div>
    <div class="filter-scroll" id="brand-filters">
      <button class="chip active" data-brand="All">All</button>
    </div>
  </div>

  <!-- PRODUCTS -->
  <div class="section">
    <div class="section-header">
      <h2 class="section-title">All Products</h2>
    </div>
    <div class="product-grid" id="product-grid">
      <!-- Loaded by JS -->
    </div>
  </div>

</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="index.html" class="bottom-nav-btn active">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Home
  </a>
  <a href="cart.html" class="bottom-nav-btn">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 001.95-1.56L23 6H6"/></svg>
    Cart
  </a>
  <a href="profile.html" class="bottom-nav-btn">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Profile
  </a>
</nav>

<script type="module" src="app.js"></script>
</body>
</html>
