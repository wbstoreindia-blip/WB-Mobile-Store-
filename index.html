<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WB Mobile Store</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="top-navbar">
        <div class="nav-top-row">
            <div class="logo">
                WB STORE <i class="fa-solid fa-bolt" style="color: var(--neon-green);"></i>
            </div>
            <div class="nav-actions">
                <button id="theme-toggle" class="theme-btn">
                    <i class="fa-solid fa-sun" id="theme-icon"></i>
                </button>
            </div>
        </div>
        
        <div class="search-container">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <input type="text" id="search-input" placeholder="Search phones, brands...">
        </div>
    </header>

    <main class="main-content">
        
        <section class="banner-section">
            <div class="banner-slider" id="banner-slider">
                </div>
        </section>

        <section class="category-chips">
            <button class="chip active" data-category="all">ALL</button>
            <button class="chip" data-category="android">ANDROID</button>
            <button class="chip" data-category="ios">iOS</button>
            <button class="chip" data-category="accessories">ACCESSORIES</button>
        </section>

        <section class="product-section">
            <div class="section-header">
                <h2>Latest Arrivals</h2>
            </div>
            
            <div class="product-grid" id="product-grid">
                </div>
        </section>

    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </a>
        <a href="wishlist.html" class="nav-item">
            <i class="fa-solid fa-heart"></i>
            <span>Wishlist</span>
        </a>
        <a href="cart.html" class="nav-item">
            <div class="cart-icon-wrapper">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="cart-badge" id="cart-badge">0</span>
            </div>
            <span>Cart</span>
        </a>
        <a href="account.html" class="nav-item">
            <i class="fa-solid fa-user"></i>
            <span>Account</span>
        </a>
    </nav>

    <script type="module" src="js/main.js"></script>
    
</body>
</html>
