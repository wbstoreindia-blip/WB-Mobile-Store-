<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wb Mobile Store</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ── Reset & Base ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #B8E3E9;
      color: #0B2E33;
      min-height: 100vh;
    }

    /* ── Navbar ────────────────────────────────────────────── */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(184, 227, 233, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(79, 124, 130, 0.18);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .navbar-logo {
      height: 36px;
      width: auto;
      flex-shrink: 0;
    }

    .navbar-logo-text {
      font-size: 18px;
      font-weight: 700;
      color: #0B2E33;
      letter-spacing: -0.3px;
      flex-shrink: 0;
    }

    .search-wrap {
      flex: 1;
      position: relative;
    }

    #searchBar {
      width: 100%;
      padding: 9px 16px;
      border-radius: 24px;
      border: 1.5px solid rgba(79, 124, 130, 0.3);
      background: rgba(255, 255, 255, 0.5);
      color: #0B2E33;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    #searchBar:focus { border-color: #4F7C82; }
    #searchBar::placeholder { color: #93B1B5; }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .nav-icon-btn {
      position: relative;
      background: rgba(255, 255, 255, 0.45);
      border: 1.5px solid rgba(79, 124, 130, 0.2);
      border-radius: 10px;
      padding: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .nav-icon-btn:hover { background: rgba(255,255,255,0.65); }

    .nav-icon-btn svg { width: 20px; height: 20px; stroke: #0B2E33; fill: none; }

    #cartCount {
      position: absolute;
      top: -6px;
      right: -6px;
      background: #4F7C82;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }

    /* Admin Button — hidden by default, JS controls visibility */
    #adminNavBtn {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: #0B2E33;
      color: #B8E3E9;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    #adminNavBtn:hover { opacity: 0.85; }

    /* ── Cart Feedback ──────────────────────────────────────── */
    #cartFeedback {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #0B2E33;
      color: #B8E3E9;
      padding: 10px 22px;
      border-radius: 24px;
      font-size: 14px;
      z-index: 999;
      box-shadow: 0 4px 20px rgba(11,46,51,0.2);
    }

    /* ── Banner Slider ──────────────────────────────────────── */
    .banner-section {
      padding: 16px 16px 0;
    }

    #bannerSlider {
      height: 180px;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      background: rgba(79, 124, 130, 0.15);
    }

    .banner-slide {
      width: 100%;
      height: 100%;
    }

    /* ── Filters ────────────────────────────────────────────── */
    .filter-section {
      padding: 16px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-section select {
      flex: 1;
      min-width: 130px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1.5px solid rgba(79, 124, 130, 0.25);
      background: rgba(255, 255, 255, 0.5);
      color: #0B2E33;
      font-size: 14px;
      appearance: none;
      outline: none;
      cursor: pointer;
    }

    /* ── Product Grid ───────────────────────────────────────── */
    #productGrid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      padding: 0 16px 32px;
    }

    .product-card {
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 14px;
      overflow: hidden;
      border: 1.5px solid rgba(79, 124, 130, 0.18);
      cursor: pointer;
      transition: transform 0.18s, box-shadow 0.18s;
      box-shadow: 0 2px 8px rgba(11,46,51,0.06);
    }

    .product-card:active { transform: scale(0.98); }

    .product-img-wrap {
      position: relative;
      height: 140px;
      background: #B8E3E9;
      overflow: hidden;
    }

    .product-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }

    .out-of-stock-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(192,57,43,0.9);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 6px;
    }

    .product-info {
      padding: 10px 12px 12px;
    }

    .product-name {
      font-size: 13px;
      font-weight: 600;
      color: #0B2E33;
      margin-bottom: 2px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .product-brand {
      font-size: 11px;
      color: #93B1B5;
      margin-bottom: 6px;
    }

    .product-price {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }

    .price-original {
      font-size: 12px;
      color: #93B1B5;
      text-decoration: line-through;
    }

    .price-discount {
      font-size: 15px;
      font-weight: 700;
      color: #0B2E33;
    }

    .btn-add-cart {
      width: 100%;
      padding: 8px;
      background: #4F7C82;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-add-cart:hover { background: #0B2E33; }

    /* ── Bottom Nav ─────────────────────────────────────────── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(184, 227, 233, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(79, 124, 130, 0.18);
      display: flex;
      justify-content: space-around;
      padding: 8px 0 max(8px, env(safe-area-inset-bottom));
      z-index: 90;
    }

    .bottom-nav a {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      text-decoration: none;
      color: #93B1B5;
      font-size: 10px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 8px;
      transition: color 0.2s;
    }

    .bottom-nav a.active, .bottom-nav a:hover { color: #0B2E33; }

    .bottom-nav svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      fill: none;
    }

    /* ── Admin Section ──────────────────────────────────────── */
    #adminSection {
      display: none;
      padding: 0 16px 16px;
    }

    #adminBtn {
      display: none; /* JS shows this for admin */
      width: 100%;
      padding: 14px;
      background: #0B2E33;
      color: #B8E3E9;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.2s;
    }

    #adminBtn:hover { opacity: 0.85; }

    body { padding-bottom: 70px; }

    @media (min-width: 600px) {
      #productGrid { grid-template-columns: repeat(3, 1fr); }
      #bannerSlider { height: 240px; }
    }

    @media (min-width: 900px) {
      .navbar { padding: 12px 32px; }
      .banner-section, .filter-section, #productGrid, #adminSection { padding-left: 32px; padding-right: 32px; }
      #productGrid { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>

  <!-- ── Navbar ──────────────────────────────────────────────── -->
  <nav class="navbar">
    <span class="navbar-logo-text">Wb Store</span>

    <div class="search-wrap">
      <input type="search" id="searchBar" placeholder="Search products..." autocomplete="off" />
    </div>

    <div class="nav-actions">
      <!-- Admin Panel button — hidden by default, JS shows it for admin -->
      <button id="adminNavBtn" title="Admin Panel">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        Admin
      </button>

      <!-- Cart -->
      <button class="nav-icon-btn" onclick="window.location.href='cart.html'" title="Cart">
        <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span id="cartCount">0</span>
      </button>

      <!-- Profile -->
      <button class="nav-icon-btn" onclick="window.location.href='profile.html'" title="Profile">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </button>
    </div>
  </nav>

  <!-- ── Banner Slider ──────────────────────────────────────── -->
  <section class="banner-section">
    <div id="bannerSlider">
      <div class="banner-slide">
        <p style="color:#4F7C82;text-align:center;padding:60px 20px;font-size:14px;">Loading banners...</p>
      </div>
    </div>
  </section>

  <!-- ── Filters ────────────────────────────────────────────── -->
  <div class="filter-section">
    <select id="categoryFilter">
      <option value="all">All Categories</option>
    </select>
    <select id="brandFilter">
      <option value="all">All Brands</option>
    </select>
  </div>

  <!-- ── Product Grid ───────────────────────────────────────── -->
  <main id="productGrid">
    <p style="color:#4F7C82;text-align:center;padding:40px;grid-column:1/-1;font-size:14px;">Loading products...</p>
  </main>

  <!-- ── Admin Quick Access (shown only to admin) ────────────── -->
  <div id="adminSection">
    <button id="adminBtn">
      <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      Go to Admin Panel
    </button>
  </div>

  <!-- ── Cart Feedback Toast ────────────────────────────────── -->
  <div id="cartFeedback"></div>

  <!-- ── Bottom Navigation ──────────────────────────────────── -->
  <nav class="bottom-nav">
    <a href="index.html" class="active">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </a>
    <a href="cart.html">
      <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 001.99-1.61L23 6H6"/></svg>
      Cart
    </a>
    <a href="profile.html">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profile
    </a>
  </nav>

  <!-- ── Scripts ────────────────────────────────────────────── -->
  <script type="module" src="app.js"></script>

  <script>
    // Fallback: show admin section wrapper when adminBtn is visible
    const _adminBtn = document.getElementById("adminBtn");
    const _adminSection = document.getElementById("adminSection");
    if (_adminBtn && _adminSection) {
      const observer = new MutationObserver(() => {
        _adminSection.style.display = _adminBtn.style.display !== "none" ? "block" : "none";
      });
      observer.observe(_adminBtn, { attributes: true, attributeFilter: ["style"] });
    }
  </script>

</body>
</html>
