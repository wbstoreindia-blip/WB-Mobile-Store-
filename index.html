<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wb Mobile Store — Premium Devices</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Syne:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Animated Background -->
  <div class="bg-mesh">
    <div class="mesh-orb orb-1"></div>
    <div class="mesh-orb orb-2"></div>
    <div class="mesh-orb orb-3"></div>
    <div class="mesh-orb orb-4"></div>
  </div>

  <!-- NAVBAR -->
  <nav class="navbar glass-nav" id="navbar">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <span class="logo-icon">⬡</span>
        <span class="logo-text">WB<span class="logo-accent">Mobile</span></span>
      </a>

      <div class="nav-actions">
        <a href="cart.html" class="nav-icon-btn" id="cartBtn" aria-label="Cart">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          <span class="cart-badge" id="cartCount">0</span>
        </a>
        <a href="login.html" class="nav-icon-btn" id="profileBtn" aria-label="Profile">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </a>
      </div>
    </div>
  </nav>

  <!-- HERO BANNER -->
  <section class="hero-section">
    <div class="hero-content">
      <p class="hero-label">Next-Gen Devices</p>
      <h1 class="hero-title">Future in<br/><span class="gradient-text">Your Hands</span></h1>
      <p class="hero-sub">Discover premium smartphones curated for the bold.</p>
      <a href="#products" class="neon-button hero-cta">Explore Now</a>
    </div>
    <div class="hero-visual">
      <div class="hero-glow-ring ring-1"></div>
      <div class="hero-glow-ring ring-2"></div>
      <div class="hero-phone-icon">📱</div>
    </div>
  </section>

  <!-- FILTER BAR -->
  <section class="filter-section" id="products">
    <div class="container">
      <div class="filter-bar glass-card">
        <span class="filter-label">Filter:</span>
        <div class="filter-chips" id="filterChips">
          <button class="chip active" data-filter="all">All</button>
          <button class="chip" data-filter="samsung">Samsung</button>
          <button class="chip" data-filter="apple">Apple</button>
          <button class="chip" data-filter="oneplus">OnePlus</button>
          <button class="chip" data-filter="xiaomi">Xiaomi</button>
        </div>
        <div class="search-wrap">
          <input type="search" id="searchInput" class="input-field search-input" placeholder="Search devices…" aria-label="Search products" />
        </div>
      </div>
    </div>
  </section>

  <!-- PRODUCTS GRID -->
  <main class="container" id="mainContent">
    <div class="section-header">
      <h2 class="section-title">Featured <span class="gradient-text">Devices</span></h2>
      <span class="product-count" id="productCount">Loading…</span>
    </div>

    <!-- Loading Skeleton -->
    <div class="products-grid" id="productsGrid">
      <div class="skeleton-card glass-card" aria-hidden="true">
        <div class="skeleton-img shimmer"></div>
        <div class="skeleton-line shimmer" style="width:70%"></div>
        <div class="skeleton-line shimmer" style="width:45%"></div>
        <div class="skeleton-line shimmer" style="width:30%"></div>
      </div>
      <div class="skeleton-card glass-card" aria-hidden="true">
        <div class="skeleton-img shimmer"></div>
        <div class="skeleton-line shimmer" style="width:65%"></div>
        <div class="skeleton-line shimmer" style="width:40%"></div>
        <div class="skeleton-line shimmer" style="width:30%"></div>
      </div>
      <div class="skeleton-card glass-card" aria-hidden="true">
        <div class="skeleton-img shimmer"></div>
        <div class="skeleton-line shimmer" style="width:75%"></div>
        <div class="skeleton-line shimmer" style="width:50%"></div>
        <div class="skeleton-line shimmer" style="width:30%"></div>
      </div>
    </div>

    <!-- Empty State -->
    <div class="empty-state hidden" id="emptyState">
      <div class="empty-icon">🔍</div>
      <h3>No devices found</h3>
      <p>Try a different search or filter.</p>
    </div>
  </main>

  <!-- TOAST NOTIFICATION -->
  <div class="toast" id="toast" role="alert" aria-live="polite"></div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <p class="footer-brand">⬡ WB<span class="logo-accent">Mobile</span> Store</p>
      <p class="footer-copy">© 2024 Wb Mobile Store. All rights reserved.</p>
    </div>
  </footer>

  <!-- SCRIPTS -->
  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="app.js"></script>
  <script type="module" src="cart.js"></script>

  <script>
    // Navbar scroll effect
    window.addEventListener('scroll', () => {
      const nav = document.getElementById('navbar');
      nav.classList.toggle('scrolled', window.scrollY > 40);
    });

    // Filter chips
    document.getElementById('filterChips').addEventListener('click', (e) => {
      if (e.target.classList.contains('chip')) {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        e.target.classList.add('active');
        const filter = e.target.dataset.filter;
        if (window.filterProducts) window.filterProducts(filter);
      }
    });

    // Search
    document.getElementById('searchInput').addEventListener('input', (e) => {
      if (window.searchProducts) window.searchProducts(e.target.value);
    });
  </script>
</body>
</html>
