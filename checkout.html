<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Checkout - WB Store</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        .checkout-section {
            background-color: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .checkout-section h3 {
            margin-bottom: 15px;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-input {
            width: 100%;
            padding: 12px 15px;
            background-color: var(--bg-black);
            border: 1px solid var(--border-color);
            color: var(--text-white);
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--neon-green);
        }
        .two-column {
            display: flex;
            gap: 10px;
        }
        .payment-option {
            border: 1px solid var(--neon-green);
            background-color: rgba(29, 185, 84, 0.1);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }
        .payment-option input[type="radio"] {
            accent-color: var(--neon-green);
            width: 18px;
            height: 18px;
        }
    </style>
</head>
<body>

    <header class="top-navbar">
        <div class="nav-top-row">
            <button class="icon-btn" onclick="history.back()">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            
            <div class="page-title">
                Checkout
            </div>
            
            <div class="nav-actions">
                <button id="theme-toggle" class="theme-btn">
                    <i class="fa-solid fa-sun" id="theme-icon"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="main-content checkout-page">
        
        <div class="checkout-section">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="color: var(--text-grey);">Total Amount:</span>
                <span id="checkout-total-amount" style="font-size: 20px; font-weight: 700; color: var(--neon-green);">₹0</span>
            </div>
            <p style="font-size: 12px; color: var(--text-grey); margin-top: 5px;">Including all taxes & free shipping</p>
        </div>

        <form id="checkout-form">
            <div class="checkout-section">
                <h3><i class="fa-solid fa-location-dot" style="color: var(--neon-green);"></i> Delivery Address</h3>
                
                <div class="form-group">
                    <input type="text" id="checkout-name" class="form-input" placeholder="Full Name" required>
                </div>
                
                <div class="form-group">
                    <input type="tel" id="checkout-phone" class="form-input" placeholder="Phone Number" required>
                </div>
                
                <div class="form-group">
                    <textarea id="checkout-address" class="form-input" placeholder="Flat, House no., Building, Company, Apartment" rows="3" required></textarea>
                </div>
                
                <div class="two-column">
                    <div class="form-group" style="flex: 1;">
                        <input type="text" id="checkout-state" class="form-input" placeholder="State" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <input type="text" id="checkout-pin" class="form-input" placeholder="Pincode" required>
                    </div>
                </div>
            </div>

            <div class="checkout-section">
                <h3><i class="fa-solid fa-wallet" style="color: var(--neon-green);"></i> Payment Method</h3>
                
                <div class="payment-option">
                    <input type="radio" id="pay-cod" name="payment_method" value="COD" checked readonly>
                    <label for="pay-cod" style="cursor: pointer; width: 100%;">Cash on Delivery (COD)</label>
                </div>
                <p style="font-size: 12px; color: var(--text-grey); margin-top: 10px;">Pay using Cash or UPI when the item is delivered to your doorstep.</p>
            </div>

            <button type="submit" id="place-order-btn" class="btn-primary full-width-btn" style="padding: 16px; font-size: 16px; margin-bottom: 30px;">
                CONFIRM & PLACE ORDER
            </button>
        </form>

    </main>

    <script type="module" src="js/main.js"></script>
    
</body>
</html>
