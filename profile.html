<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - WB Mobile Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page-loader" id="page-loader"><div class="loader-ring"></div></div>

<!-- PROFILE HEADER -->
<div class="profile-header">
  <div class="profile-avatar">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
  </div>
  <div class="profile-name" id="profile-name">User</div>
  <div class="profile-email" id="profile-email">Loading...</div>
  <button onclick="signOutUser()" class="btn btn-secondary btn-sm" style="margin-top:16px;border-color:rgba(255,255,255,0.2);color:var(--bg)">Sign Out</button>
</div>

<!-- NAVBAR (transparent, minimal) -->
<nav style="position:sticky;top:0;z-index:100;background:rgba(11,46,51,0.9);backdrop-filter:blur(12px);padding:0 20px;height:52px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,0.1)">
  <a href="index.html" style="color:var(--bg);display:flex;align-items:center">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  </a>
  <span style="font-family:var(--font-display);font-size:1rem;font-weight:600;color:var(--bg);flex:1">My Profile</span>
  <a href="cart.html" style="position:relative;color:var(--bg)">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 001.95-1.56L23 6H6"/></svg>
    <span class="cart-badge" style="display:none;border-color:var(--dark)">0</span>
  </a>
</nav>

<div class="page-content" style="padding:20px 20px 80px">

  <h2 style="font-family:var(--font-display);font-size:1.2rem;color:var(--dark);margin-bottom:16px">My Orders</h2>

  <!-- ORDERS LIST -->
  <div id="orders-list">
    <div style="text-align:center;padding:40px"><div class="loader-ring" style="margin:0 auto"></div></div>
  </div>

  <!-- EMPTY -->
  <div id="orders-empty" style="display:none" class="empty-state">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
    <p style="margin-bottom:16px">No orders yet</p>
    <a href="index.html" class="btn btn-primary">Start Shopping</a>
  </div>

</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="index.html" class="bottom-nav-btn">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Home
  </a>
  <a href="cart.html" class="bottom-nav-btn">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 001.95-1.56L23 6H6"/></svg>
    Cart
  </a>
  <a href="profile.html" class="bottom-nav-btn active">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Profile
  </a>
</nav>

<!-- TRACKING MODAL -->
<div class="modal-overlay" id="tracking-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Order Tracking</div>
    <div id="tracking-content"></div>
    <button class="btn btn-secondary btn-full" id="close-tracking" style="margin-top:20px">Close</button>
  </div>
</div>

<!-- REVIEW MODAL -->
<div class="modal-overlay" id="review-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Write a Review</div>
    <form id="review-form">
      <div class="form-group">
        <label class="form-label">Your Review</label>
        <textarea class="form-textarea" name="review-text" placeholder="Share your experience with this product..." required style="min-height:120px"></textarea>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Submit Review</button>
    </form>
  </div>
</div>

<script type="module" src="profile.js"></script>
</body>
</html>
