<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — Wb Mobile Store</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #B8E3E9;
      color: #0B2E33;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* ── Navbar ─────────────────────────────────────────────── */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(184, 227, 233, 0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(79, 124, 130, 0.18);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .navbar-title {
      font-size: 17px;
      font-weight: 700;
      color: #0B2E33;
    }

    /* ── Profile Header ─────────────────────────────────────── */
    .profile-header {
      padding: 28px 20px 20px;
      text-align: center;
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: rgba(79, 124, 130, 0.2);
      border: 2.5px solid rgba(79, 124, 130, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      font-size: 28px;
      color: #4F7C82;
    }

    #userName {
      font-size: 18px;
      font-weight: 700;
      color: #0B2E33;
      margin-bottom: 4px;
    }

    #userEmail {
      font-size: 13px;
      color: #93B1B5;
    }

    /* ── Actions Card ───────────────────────────────────────── */
    .profile-actions {
      margin: 0 16px 20px;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 16px;
      border: 1.5px solid rgba(79, 124, 130, 0.18);
      overflow: hidden;
    }

    .action-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px 18px;
      cursor: pointer;
      border-bottom: 1px solid rgba(79, 124, 130, 0.1);
      transition: background 0.15s;
      text-decoration: none;
      color: #0B2E33;
    }

    .action-item:last-child { border-bottom: none; }
    .action-item:hover, .action-item:active { background: rgba(79, 124, 130, 0.08); }

    .action-item svg {
      width: 20px;
      height: 20px;
      stroke: #4F7C82;
      fill: none;
      flex-shrink: 0;
    }

    .action-label {
      flex: 1;
      font-size: 14px;
      font-weight: 500;
    }

    .action-chevron {
      color: #93B1B5;
      font-size: 18px;
    }

    /* ── Admin Panel Button ─────────────────────────────────── */
    #adminBtn {
      display: none; /* JS controls this */
      width: calc(100% - 32px);
      margin: 0 16px 16px;
      padding: 15px;
      background: #0B2E33;
      color: #B8E3E9;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 16px rgba(11,46,51,0.2);
      transition: opacity 0.2s;
    }

    #adminBtn:hover { opacity: 0.85; }

    .admin-badge {
      background: #4F7C82;
      color: #fff;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
      margin-left: 4px;
    }

    /* ── Sign Out ───────────────────────────────────────────── */
    .signout-section {
      padding: 0 16px 16px;
    }

    #signOutBtn {
      width: 100%;
      padding: 14px;
      background: rgba(192, 57, 43, 0.1);
      color: #c0392b;
      border: 1.5px solid rgba(192, 57, 43, 0.25);
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s;
    }

    #signOutBtn:hover { background: rgba(192, 57, 43, 0.18); }

    #signOutBtn svg {
      width: 18px;
      height: 18px;
      stroke: #c0392b;
      fill: none;
    }

    /* ── Error / Feedback ───────────────────────────────────── */
    #logoutError {
      display: none;
      color: #c0392b;
      font-size: 13px;
      text-align: center;
      margin: 4px 16px 12px;
      padding: 10px;
      background: rgba(192,57,43,0.08);
      border-radius: 8px;
    }

    /* ── Orders Section ─────────────────────────────────────── */
    .orders-section {
      padding: 0 16px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: #0B2E33;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title svg {
      width: 18px;
      height: 18px;
      stroke: #4F7C82;
      fill: none;
    }

    #ordersError {
      display: none;
    }

    #ordersContainer {
      min-height: 80px;
    }

    /* ── Bottom Nav ─────────────────────────────────────────── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(184, 227, 233, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(79, 124, 130, 0.18);
      display: flex;
      justify-content: space-around;
      padding: 8px 0 max(8px, env(safe-area-inset-bottom));
      z-index: 90;
    }

    .bottom-nav a {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      text-decoration: none;
      color: #93B1B5;
      font-size: 10px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 8px;
      transition: color 0.2s;
    }

    .bottom-nav a.active, .bottom-nav a:hover { color: #0B2E33; }

    .bottom-nav svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      fill: none;
    }

    @media (min-width: 600px) {
      .profile-header { padding-top: 40px; }
      .profile-actions, .signout-section { max-width: 480px; margin-left: auto; margin-right: auto; }
      #adminBtn { max-width: 480px; margin-left: auto; margin-right: auto; display: none; }
      .orders-section { max-width: 600px; margin-left: auto; margin-right: auto; }
    }
  </style>
</head>
<body>

  <!-- ── Navbar ──────────────────────────────────────────────── -->
  <nav class="navbar">
    <button onclick="window.history.back()"
      style="background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:4px;color:#0B2E33;font-size:14px;font-weight:500;padding:4px;">
      <svg viewBox="0 0 24 24" width="20" height="20" stroke="#0B2E33" fill="none"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </button>
    <span class="navbar-title">My Profile</span>
    <div style="width:56px;"></div><!-- spacer -->
  </nav>

  <!-- ── Profile Header ─────────────────────────────────────── -->
  <div class="profile-header">
    <div class="avatar">
      <svg viewBox="0 0 24 24" width="32" height="32" stroke="#4F7C82" fill="none">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </div>
    <p id="userName">Loading...</p>
    <p id="userEmail"></p>
  </div>

  <!-- ── Admin Panel Button (hidden by default, JS shows for admin) ── -->
  <button id="adminBtn">
    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/>
      <path d="M2 17l10 5 10-5"/>
      <path d="M2 12l10 5 10-5"/>
    </svg>
    Admin Panel
    <span class="admin-badge">Admin</span>
  </button>

  <!-- ── Profile Actions ────────────────────────────────────── -->
  <div class="profile-actions">
    <a href="index.html" class="action-item">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="action-label">Home</span>
      <span class="action-chevron">›</span>
    </a>
    <a href="cart.html" class="action-item">
      <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 001.99-1.61L23 6H6"/></svg>
      <span class="action-label">My Cart</span>
      <span class="action-chevron">›</span>
    </a>
  </div>

  <!-- ── Logout Error ───────────────────────────────────────── -->
  <div id="logoutError"></div>

  <!-- ── Sign Out ───────────────────────────────────────────── -->
  <div class="signout-section">
    <button id="signOutBtn" class="signout-btn">
      <svg viewBox="0 0 24 24">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Sign Out
    </button>
  </div>

  <!-- ── Orders Section ─────────────────────────────────────── -->
  <div class="orders-section">
    <h2 class="section-title">
      <svg viewBox="0 0 24 24"><path d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8l1 13a2 2 0 002 2h8a2 2 0 002-2l1-13"/></svg>
      My Orders
    </h2>

    <!-- Error message container -->
    <div id="ordersError"></div>

    <!-- Orders list rendered by JS -->
    <div id="ordersContainer">
      <p style="color:#4F7C82;text-align:center;padding:32px;font-size:14px;">Loading orders...</p>
    </div>
  </div>

  <!-- ── Bottom Navigation ──────────────────────────────────── -->
  <nav class="bottom-nav">
    <a href="index.html">
      <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </a>
    <a href="cart.html">
      <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 001.99-1.61L23 6H6"/></svg>
      Cart
    </a>
    <a href="profile.html" class="active">
      <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Profile
    </a>
  </nav>

  <script type="module" src="profile.js"></script>

</body>
</html>
