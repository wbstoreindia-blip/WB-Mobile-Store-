<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Dashboard - WB Store</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">

    <style>
        .admin-section {
            background-color: var(--bg-panel);
            border: 1px solid var(--neon-green);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .admin-section h3 {
            margin-bottom: 20px;
            color: var(--neon-green);
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            color: var(--text-grey);
            font-weight: 600;
        }
        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 12px;
            background-color: var(--bg-black);
            border: 1px solid var(--border-color);
            color: var(--text-white);
            border-radius: 8px;
            font-size: 14px;
        }
        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--neon-green);
        }
        .two-column {
            display: flex;
            gap: 15px;
        }
        .two-column > div {
            flex: 1;
        }
        .image-inputs-container {
            background-color: rgba(255, 255, 255, 0.02);
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed var(--border-color);
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <header class="top-navbar" style="border-bottom: 2px solid var(--neon-green);">
        <div class="nav-top-row">
            <button class="icon-btn" onclick="history.back()">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            
            <div class="page-title">
                <i class="fa-solid fa-shield-halved"></i> Admin Panel
            </div>
            
            <div class="nav-actions">
                <button id="theme-toggle" class="theme-btn">
                    <i class="fa-solid fa-sun" id="theme-icon"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="main-content admin-page">
        
        <div id="admin-access-denied" class="empty-state" style="display: none;">
            <i class="fa-solid fa-triangle-exclamation empty-icon" style="color: #ff4444;"></i>
            <h2 style="color: #ff4444;">Access Denied</h2>
            <p>You do not have permission to view this page.</p>
            <a href="index.html" class="btn-primary" style="display: inline-block; padding: 12px 24px; text-decoration: none; margin-top: 15px;">Go to Home</a>
        </div>

        <div id="admin-dashboard-content">
            
            <div class="admin-section">
                <h3><i class="fa-solid fa-plus"></i> Upload New Product</h3>
                
                <form id="add-product-form">
                    <div class="form-group">
                        <label class="form-label">Product Title</label>
                        <input type="text" id="prod-name" class="form-input" placeholder="e.g. iPhone 15 Pro Max" required>
                    </div>

                    <div class="two-column">
                        <div class="form-group">
                            <label class="form-label">Brand</label>
                            <input type="text" id="prod-brand" class="form-input" placeholder="e.g. Apple" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Category</label>
                            <select id="prod-category" class="form-select" required>
                                <option value="android">Android</option>
                                <option value="ios">iOS</option>
                                <option value="accessories">Accessories</option>
                            </select>
                        </div>
                    </div>

                    <div class="two-column">
                        <div class="form-group">
                            <label class="form-label">Selling Price (₹)</label>
                            <input type="number" id="prod-price" class="form-input" placeholder="e.g. 124900" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Old Price (Optional) (₹)</label>
                            <input type="number" id="prod-old-price" class="form-input" placeholder="e.g. 134900">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Description</label>
                        <textarea id="prod-desc" class="form-textarea" rows="4" placeholder="Features, RAM, Storage, etc." required></textarea>
                    </div>

                    <div class="image-inputs-container">
                        <label class="form-label" style="color: var(--neon-green);">Product Images (Cloudinary URLs)</label>
                        <p style="font-size: 11px; color: var(--text-grey); margin-bottom: 10px;">Paste the links generated from your Cloudinary account.</p>
                        
                        <input type="url" id="img-url-1" class="form-input" placeholder="Main Image URL (Required)" style="margin-bottom: 8px;" required>
                        <input type="url" id="img-url-2" class="form-input" placeholder="Image 2 URL (Optional)" style="margin-bottom: 8px;">
                        <input type="url" id="img-url-3" class="form-input" placeholder="Image 3 URL (Optional)" style="margin-bottom: 8px;">
                        <input type="url" id="img-url-4" class="form-input" placeholder="Image 4 URL (Optional)" style="margin-bottom: 8px;">
                        <input type="url" id="img-url-5" class="form-input" placeholder="Image 5 URL (Optional)">
                    </div>

                    <button type="submit" id="submit-product-btn" class="btn-primary full-width-btn" style="padding: 15px;">
                        <i class="fa-solid fa-cloud-arrow-up"></i> PUBLISH PRODUCT
                    </button>
                </form>
            </div>

            <div class="admin-section">
                <h3><i class="fa-solid fa-boxes-packing"></i> Recent Orders</h3>
                <div id="admin-orders-list">
                    <p style="color: var(--text-grey); font-size: 14px;">Loading orders...</p>
                </div>
            </div>

        </div>

    </main>

    <script type="module" src="js/main.js"></script>
    
</body>
</html>
